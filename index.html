<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
  :root {
    --green: #2D6A4F;
    --green-light: #40916C;
    --green-pale: #D8F3DC;
    --orange: #C1440E;
    --cream: #F8F5F0;
    --dark: #1B2B24;
    --mid: #3A4A3E;
    --radius-color: rgba(45, 106, 79, 0.12);
    --radius-border: rgba(45, 106, 79, 0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--cream);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(26, 26, 46, 0.95);
    border-bottom: 1px solid rgba(82, 183, 136, 0.2);
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo-block {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-icon {
    width: 38px;
    height: 38px;
    background: var(--green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  h1 span { color: var(--green-light); }

  .subtitle {
    font-size: 11px;
    color: rgba(248,245,240,0.5);
    margin-top: 1px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--green-light);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: rgba(248,245,240,0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-divider {
    width: 1px;
    height: 30px;
    background: rgba(255,255,255,0.1);
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
  }

  .sidebar {
    width: 300px;
    background: rgba(26, 26, 46, 0.98);
    border-left: 1px solid rgba(82, 183, 136, 0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--green-light);
    margin-bottom: 10px;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
  }

  .tab {
    flex: 1;
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(248,245,240,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tab.active {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .tab:hover:not(.active) {
    border-color: var(--green-light);
    color: var(--green-light);
  }

  .search-box {
    margin: 10px 0 0;
  }

  .search-box input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
  }

  .search-box input:focus {
    border-color: var(--green-light);
  }

  .search-box input::placeholder { color: rgba(248,245,240,0.3); }

  .list-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .list-area::-webkit-scrollbar { width: 4px; }
  .list-area::-webkit-scrollbar-track { background: transparent; }
  .list-area::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(248,245,240,0.35);
    padding: 10px 8px 4px;
  }

  .location-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
  }

  .location-item:hover { background: rgba(255,255,255,0.06); }
  .location-item.active-item { background: rgba(82,183,136,0.12); }

  .loc-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .loc-name {
    font-size: 12px;
    font-weight: 500;
    flex: 1;
    line-height: 1.3;
  }

  .loc-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 600;
  }

  .badge-in { background: rgba(82,183,136,0.2); color: var(--green-light); }
  .badge-out { background: rgba(231,111,81,0.15); color: var(--orange); }
  .badge-hq { background: rgba(82,183,136,0.3); color: var(--green-light); }
  .badge-branch { background: rgba(82,183,136,0.15); color: var(--green-light); }

  .legend-bar {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .legend-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(248,245,240,0.35);
    font-weight: 600;
  }

  .legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(248,245,240,0.7);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .legend-sq {
    width: 14px;
    height: 10px;
    border-radius: 2px;
  }

  .radius-control {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .radius-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .radius-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(248,245,240,0.45);
    font-weight: 600;
  }

  .radius-value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #00E096;
  }

  .radius-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.18);
    outline: none;
    cursor: pointer;
  }

  .radius-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #00E096;
    cursor: pointer;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .radius-slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #00E096;
    cursor: pointer;
    border: 2px solid white;
  }

  .radius-presets {
    display: flex;
    gap: 4px;
  }

  .preset-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.18);
    background: transparent;
    color: rgba(248,245,240,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-weight: 600;
  }

  .preset-btn.active-preset { background: rgba(0,224,150,0.18); border-color: #00E096; color: #00E096; }

  .leaflet-popup-content-wrapper {
    background: rgba(26,26,46,0.97);

  .leaflet-popup-tip { background: rgba(26,26,46,0.97); }

  .popup-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--green-light);

    text-transform: uppercase;

    color: rgba(248,245,240,0.4);

  .popup-seb-yes { color: var(--green-light); font-weight: 600; }
  .popup-seb-no { color: var(--orange); }

    </div>
  </div>

    <div class="stat">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">SEB-locaties</div>
    </div>
  </div>
</header>

<div class="main">
  <div id="map"></div>

  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Locaties</div>
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">Alles</button>
        <button class="tab" onclick="setFilter('in', this)">In zone</button>
        <button class="tab" onclick="setFilter('out', this)">Buiten zone</button>
        <button class="tab" onclick="setFilter('krinkels', this)">Krinkels</button>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Zoek locatie..." oninput="filterSearch(this.value)">
      </div>
    </div>

    <div class="list-area" id="location-list"></div>

    <div class="legend-bar">
      <div class="legend-title">Legenda</div>

        <div class="legend-item">

        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#00C853"></div> SEB in zone
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#FF1744"></div> SEB buiten zone
        </div>
        <div class="legend-item">
          <div class="legend-sq" style="background:rgba(0,180,255,0.15); border:2px solid #00B4FF"></div> Straal
        </div>
      </div>
    </div>

    <div class="radius-control">
      <div class="radius-header">
        <span class="radius-label">Straal instellen</span>
        <span class="radius-value"><span id="radius-display">50</span> km</span>
      </div>
      <input type="range" class="radius-slider" id="radius-slider" min="10" max="200" value="50" step="5" oninput="updateRadius(this.value)">
      <div class="radius-presets">
        <button class="preset-btn active-preset" onclick="setPreset(25, this)">25 km</button>
        <button class="preset-btn" onclick="setPreset(50, this)">50 km</button>
        <button class="preset-btn" onclick="setPreset(75, this)">75 km</button>
        <button class="preset-btn" onclick="setPreset(100, this)">100 km</button>
      </div>
    </div>
  </div>
</div>

  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

// ============================================================
// DISTANCE
// ============================================================

function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getNearestKrinkels(loc) {
  let nearest = null, minDist = Infinity;
  krinkelsLocations.forEach(k => {
    const d = haversineDistance(k.lat, k.lng, loc.lat, loc.lng);
    if (d < minDist) { minDist = d; nearest = k; }
  });
  return { location: nearest, distance: Math.round(minDist) };
}

// ============================================================
// STATE
// ============================================================

let currentRadiusKm = 50;
const radiusCircles = [];
const sebMarkerObjects = {}; // name -> L.circleMarker

// ============================================================
// KRINKELS MARKERS (static)
// ============================================================

const krinkelsSvgHq = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 32 42">
  <path d="M16 0C7.163 0 0 7.163 0 16c0 10.667 16 26 16 26s16-15.333 16-26C32 7.163 24.837 0 16 0z" fill="#FFD600" stroke="#333" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="7" fill="white"/>
  <circle cx="16" cy="16" r="3.5" fill="#333"/>
</svg>`;

const krinkelsSvgBranch = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
  <path d="M13 0C5.82 0 0 5.82 0 13c0 8.667 13 21 13 21s13-12.333 13-21C26 5.82 20.18 0 13 0z" fill="#FF6B00" stroke="#333" stroke-width="1.5"/>
  <circle cx="13" cy="13" r="5.5" fill="white"/>
  <circle cx="13" cy="13" r="2.5" fill="#333"/>
</svg>`;

const krinkelsMarkers = {};
krinkelsLocations.forEach(k => {
  const svg = k.type === 'hq' ? krinkelsSvgHq : krinkelsSvgBranch;
  const size = k.type === 'hq' ? [32, 42] : [26, 34];
  const icon = L.divIcon({ html: svg, iconSize: size, iconAnchor: [size[0]/2, size[1]], className: '' });
  const marker = L.marker([k.lat, k.lng], { icon, zIndexOffset: 1000 });
  marker.bindPopup(`
    <div class="popup-title">${k.name}</div>
    <div class="popup-type">${k.type === 'hq' ? 'Hoofdkantoor' : 'Vestiging'}</div>
    <div class="popup-body">
      📍 ${k.address}
      ${k.sub ? `<br>🔗 Werkgebied: ${k.sub}` : ''}
    </div>
  `);
  marker.addTo(map);
  krinkelsMarkers[k.name] = marker;
});

// ============================================================
// SEB MARKERS (dynamic color based on radius)
// ============================================================

const typeLabels = { gemeente: 'Gemeente', grote_gemeente: 'Grote Gemeente', waterschap: 'Waterschap', semi: 'Semi-overheid' };

function getSebMarkerSize(type) {
  if (type === 'grote_gemeente') return 9;
  if (type === 'semi') return 10;
  if (type === 'waterschap') return 8;
  return 7;
}

sebLocations.forEach(loc => {
  const { location, distance } = getNearestKrinkels(loc);
  loc.nearestKrinkels = location;
  loc.nearestDist = distance;

  const marker = L.circleMarker([loc.lat, loc.lng], {
    radius: getSebMarkerSize(loc.type),
    fillColor: '#00C853',
    color: '#006B2D',
    weight: 2,
    fillOpacity: 1,
  });

  marker.bindPopup(''); // populated on click
  marker.on('click', () => {
    const inZone = loc.nearestDist <= currentRadiusKm;
    const zoneText = inZone
      ? `<span class="popup-seb-yes">✓ Binnen ${currentRadiusKm}km van ${loc.nearestKrinkels.name} (${loc.nearestDist} km)</span>`
      : `<span class="popup-seb-no">✗ Buiten ${currentRadiusKm}km zone — dichtstbij: ${loc.nearestKrinkels.name} (${loc.nearestDist} km)</span>`;
    marker.getPopup().setContent(`
      <div class="popup-title">${loc.name}</div>
      <div class="popup-type">${typeLabels[loc.type]} · SEB</div>
      <div class="popup-body"><div class="popup-seb">${zoneText}</div></div>
    `);
  });

  marker.addTo(map);
  sebMarkerObjects[loc.name] = marker;
});

// ============================================================
// RADIUS CIRCLES + MARKER COLORS (dynamic)
// ============================================================

function updateRadius(km) {
  currentRadiusKm = parseInt(km);
  document.getElementById('radius-display').textContent = currentRadiusKm;
  document.getElementById('radius-slider').value = currentRadiusKm;
  document.getElementById('stat-radius-label').textContent = currentRadiusKm;

  // Remove old circles
  radiusCircles.forEach(c => map.removeLayer(c));
  radiusCircles.length = 0;

  // Draw new circles
  krinkelsLocations.forEach(k => {
    const circle = L.circle([k.lat, k.lng], {
      radius: currentRadiusKm * 1000,
      color: '#0066FF',
      weight: 2.5,
      fillColor: '#0066FF',
      fillOpacity: 0.07,
      dashArray: '8,5',
      interactive: false,
    });
    circle.addTo(map);
    radiusCircles.push(circle);
  });

  // Update SEB marker colors
  let inCount = 0;
  sebLocations.forEach(loc => {
    const inZone = loc.nearestDist <= currentRadiusKm;
    if (inZone) inCount++;
    const marker = sebMarkerObjects[loc.name];
    if (inZone) {
      marker.setStyle({ fillColor: '#00C853', color: '#006B2D', weight: 2 });
    } else {
      marker.setStyle({ fillColor: '#FF1744', color: '#8B0000', weight: 2 });
    }
  });

  document.getElementById('stat-in').textContent = inCount;
  document.getElementById('stat-total').textContent = sebLocations.length;
  buildList();
}

function setPreset(km, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active-preset'));
  btn.classList.add('active-preset');
  updateRadius(km);
}

// ============================================================
// SIDEBAR LIST
// ============================================================

let currentFilter = 'all';
let currentSearch = '';

// Initial draw
updateRadius(50);
// Set correct preset button
document.querySelectorAll('.preset-btn')[1].classList.add('active-preset');
document.querySelectorAll('.preset-btn')[0].classList.remove('active-preset');

function buildList() {
  const listEl = document.getElementById('location-list');
  listEl.innerHTML = '';

  if (currentFilter === 'all' || currentFilter === 'krinkels') {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = 'Krinkels Locaties';
    listEl.appendChild(label);

    krinkelsLocations.forEach(k => {
      if (currentSearch && !k.name.toLowerCase().includes(currentSearch) && !k.city.toLowerCase().includes(currentSearch)) return;
      const item = document.createElement('div');
      item.className = 'location-item';
      item.innerHTML = `
        <div class="loc-dot" style="background:${k.type==='hq'?'#FFD600':'#FF6B00'}; border:1.5px solid #333"></div>
        <div class="loc-name">${k.city}</div>
        <span class="loc-badge badge-${k.type==='hq'?'hq':'branch'}">${k.type==='hq'?'HQ':'Vest.'}</span>
      `;
      item.addEventListener('click', () => {
        map.flyTo([k.lat, k.lng], 11, { duration: 1 });
        krinkelsMarkers[k.name].openPopup();
        highlightItem(item);
      });
      listEl.appendChild(item);
    });
  }

  const types = currentFilter === 'krinkels' ? [] : ['grote_gemeente', 'gemeente', 'waterschap', 'semi'];
  const typeTitles = { grote_gemeente: 'Grote Gemeenten', gemeente: 'Gemeenten', waterschap: 'Waterschappen', semi: 'Semi-overheden' };

  types.forEach(type => {
    const items = sebLocations.filter(loc => {
      if (loc.type !== type) return false;
      const inZone = loc.nearestDist <= currentRadiusKm;
      if (currentFilter === 'in' && !inZone) return false;
      if (currentFilter === 'out' && inZone) return false;
      if (currentSearch && !loc.name.toLowerCase().includes(currentSearch)) return false;
      return true;
    });
    if (!items.length) return;

    const inZoneItems = items.filter(i => i.nearestDist <= currentRadiusKm);
    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = `${typeTitles[type]} (${inZoneItems.length}/${items.length} in zone)`;
    listEl.appendChild(label);

    items.forEach(loc => {
      const inZone = loc.nearestDist <= currentRadiusKm;
      const item = document.createElement('div');
      item.className = 'location-item';
      item.innerHTML = `
        <div class="loc-dot" style="background:${inZone?'#00C853':'#FF1744'}"></div>
        <div class="loc-name">${loc.name}</div>
        <span class="loc-badge ${inZone?'badge-in':'badge-out'}">${inZone?'✓ Zone':'✗ Ver'}</span>
      `;
      item.addEventListener('click', () => {
        map.flyTo([loc.lat, loc.lng], 11, { duration: 1 });
        sebMarkerObjects[loc.name].openPopup();
        highlightItem(item);
      });
      listEl.appendChild(item);
    });
  });
}

function highlightItem(el) {
  document.querySelectorAll('.location-item').forEach(i => i.classList.remove('active-item'));
  el.classList.add('active-item');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  buildList();
}

function filterSearch(val) {
  currentSearch = val.toLowerCase();
  buildList();
}
